<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="../assets/img/logo-primaria.png">
    <style>
        .contato-content {
            display: flex;
            gap: 60px;
            align-items: flex-start;
        }
 
        .contato-form {
            display: flex;
            flex-direction: column;
            gap: 17px;
            flex: 1;
        }

        .contato-lateral {
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex: 1;
            justify-content: center;
            align-items: center;
        }
        
        iframe {
            width: 400px;
            height: 495px;
            border: none;
            display: block;
        }
        .redes-sociais {
            display: flex;
            gap: 50px;
            align-items: center;
        }
        .redes-sociais  {
            display: flex;
        }
        .redes-sociais img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            border-radius: 8px;
        }
    </style>
</head>
<body>
     <header>
        <nav>
            <div class="nav-logo">
                <a href="index.html"><img src="../assets/img/logo.png" alt="Logo" width="60px"></a>
                <a href="index.html"><img src="../assets/img/logo-nome.png" alt="Logo Nome" width="189px"></a>
            </div>

            <div class="nav-links">
                <a href="index.html">Destinos</a>
                <a href="reserva/dados-viagem.html">Fazer Reserva</a>
                <a href="contato.html">Contato</a>
                <a href="sobre.html">Sobre</a>
                <a href="minhas-reservas.html">Minhas Reservas</a>
            </div>
        </nav>
    </header>
    <main>
        <h1>Fale Conosco</h1>
 
        <div class="contato-content">
            <form class="contato-form" onsubmit="enviar(event)">
                <div class="campo">
                    <label for="nome">Nome</label>
                    <input required id="nome" type="text" placeholder="Nome Completo" style="width: 100%;">
                </div>
 
                <div class="campo">
                    <label for="email">Email</label>
                    <input required id="email" type="email" placeholder="Email" style="width: 100%;">
                </div>
 
                <div class="campo">
                    <label for="mensagem">Mensagem</label>
                    <textarea required id="mensagem" placeholder="Digite sua mensagem aqui..." style="width: 100%;"></textarea>
                </div>
 
                <button type="submit">Enviar</button>
            </form>
 
            <div class="contato-lateral">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3782.804892578125!2d-41.07200002392847!3d-16.18666498431985!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xb04d8f9b3e1b7d9%3A0x45f2b91e8e7e2c0c!2sAlmenara%2C%20MG!5e0!3m2!1spt-BR!2sbr!4v1718000000000!5m2!1spt-BR!2sbr"
                    allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Localização Destino Certo">
                </iframe>
 
                <div class="redes-sociais">
                    <a href="https://www.instagram.com/destinocerto_oficial" target="_blank">
                        <img src="../assets/img/icones-footer/instagram-colorido.png" alt="Instagram">
                    </a>
                    <a href="https://www.facebook.com/destinocerto_oficial" target="_blank">
                        <img src="../assets/img/icones-footer/facebook-colorido.png" alt="Facebook">
                    </a>
                    <a href="https://www.youtube.com/@destinocerto_oficial" target="_blank">
                        <img src="../assets/img/icones-footer/youtube-colorido.png" alt="YouTube">
                    </a>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div>
            <p>Contato</p>
            <div class="icone-texto">
                <img src="../assets/img/icones-footer/telefone.png" width="15px" alt="Icone Telefone">
                <a href="tel:+553340028922">(33) 4002-8922</a>
            </div>
            <div class="icone-texto">
                <img src="../assets/img/icones-footer/email.png" width="15px" alt="Icone Email">
                <a href="mailto:destinocerto@gmail.com">destinocerto@gmail.com</a>
            </div>
            <div class="icone-texto">
                <img src="../assets/img/icones-footer/web.png" width="15px" alt="Icone Web">
                <a href="contato.html">destinocerto.com</a>
            </div>
        </div>
 
        <div>
            <p>Redes Sociais</p>
            <div class="icone-texto">
                <img src="../assets/img/icones-footer/facebook.png" width="15px" alt="Icone Facebook">
                <a href="https://www.facebook.com/destinocerto_oficial" target="_blank">Destino Certo</a>
            </div>
            <div class="icone-texto">
                <img src="../assets/img/icones-footer/instagram.png" width="15px" alt="Icone Instagram">
                <a href="https://www.instagram.com/destinocerto_oficial" target="_blank">Destino Certo</a>
            </div>
            <div class="icone-texto">
                <img src="../assets/img/icones-footer/youtube.png" width="15px" alt="Icone Youtube">
                <a href="https://www.youtube.com/@destinocerto_oficial" target="_blank">Destino Certo</a>
            </div>
        </div>
 
        <div>
            <p>Mapa do Site</p>
            <div>
                <a href="index.html">Destinos</a>
            </div>
            <div>
                <a href="reserva/dados-viagem.html">Fazer Reserva</a>
            </div>
            <div>
                <a href="minhas-reservas.html">Minhas Reservas</a>
            </div>
        </div>
    </footer>
    <script>
        function enviar(e) {
            e.preventDefault();
            alert("Mensagem enviada com sucesso! Entraremos em contato em breve.");
            e.target.reset();
        }
    </script>
</body>
</html>
